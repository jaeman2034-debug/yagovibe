  <title>YAGO SPORTS - AI 기반 스마트 중고거래 플랫폼</title>

  <!-- 🔥 Google Maps API Key - 빌드 시점에 vite.config.ts에서 주입됨 -->
  <!-- 하드코딩된 키 제거: 환경 변수(VITE_GOOGLE_MAPS_API_KEY)만 사용 -->
  <script>
    // 빌드 시점에 vite.config.ts의 define 옵션으로 주입됨
    // window.__GOOGLE_MAPS_API_KEY__는 더 이상 사용하지 않음
  </script>

  <!--
    인앱 감지 + replace('/in-app')는 이전에 여기(React 로드 전)에서도 돌았음.
    InAppBrowserRedirect.tsx와 별개로 동작해 모바일 Chrome 오탐 → /in-app 고착·OAuth 끊김 유발.
    정책: head 인라인에서는 /in-app 으로 보내지 않음. 필요 시 UA-only는 앱 코드(InAppBrowserRedirect)에서만.
  -->

  <!-- 테스트: React·번들보다 먼저 SW 제거 (main.tsx와 중복 호출 무해) -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) { r.unregister(); });
      });
    }
  </script>
  <!-- ✅ Google Maps API는 JavaScript에서 동적으로 로드됩니다 -->
  <!-- 환경 변수를 HTML에서 직접 사용할 수 없으므로 src/main.tsx에서 로드합니다 -->
  <script type="module" src="/src/main.tsx"></script>
