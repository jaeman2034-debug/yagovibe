<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAGO SPORTS AI Voice Assistant - Test</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 20px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .button:active {
            transform: translateY(0);
        }

        .button.listening {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.8;
            }
        }

        .result {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            min-height: 100px;
        }

        .result h3 {
            margin-top: 0;
            color: #333;
        }

        .text {
            color: #666;
            line-height: 1.6;
        }

        .loading {
            text-align: center;
            color: #667eea;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🎙️ YAGO SPORTS Voice Assistant</h1>
        <p class="subtitle">음성 명령으로 AI와 대화하세요</p>

        <button class="button" id="micBtn">🎤 말하기 시작</button>

        <div class="result">
            <h3>음성 인식 결과</h3>
            <p class="text" id="transcript">아직 음성이 입력되지 않았습니다.</p>
        </div>
    </div>

    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let isListening = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'ko-KR';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                document.getElementById('transcript').textContent = transcript;
                console.log('음성 인식:', transcript);
            };

            recognition.onerror = (event) => {
                console.error('음성 인식 오류:', event.error);
                document.getElementById('transcript').textContent = `오류 발생: ${event.error}`;
                isListening = false;
                updateButton();
            };

            recognition.onend = () => {
                isListening = false;
                updateButton();
            };
        } else {
            document.getElementById('transcript').textContent = '이 브라우저는 음성 인식을 지원하지 않습니다.';
            document.getElementById('micBtn').disabled = true;
        }

        function updateButton() {
            const btn = document.getElementById('micBtn');
            if (isListening) {
                btn.classList.add('listening');
                btn.textContent = '🎧 듣는 중...';
            } else {
                btn.classList.remove('listening');
                btn.textContent = '🎤 말하기 시작';
            }
        }

        document.getElementById('micBtn').addEventListener('click', () => {
            if (!recognition) return;

            if (!isListening) {
                isListening = true;
                recognition.start();
                updateButton();
            } else {
                isListening = false;
                recognition.stop();
                updateButton();
            }
        });
