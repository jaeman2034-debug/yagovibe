name: CI

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests + coverage gate
        run: npm run test:coverage

      - name: Install Firebase Tools
        run: npm install -g firebase-tools

      - name: Security rules tests (Firestore emulator)
        run: |
          firebase emulators:exec --only firestore 'npm run test:security'
        env:
          FIRESTORE_EMULATOR_HOST: 127.0.0.1:8080
          GCLOUD_PROJECT: yago-vibe-spt

  functions-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: functions/package-lock.json

      - name: Install
        run: npm ci

      - name: Build functions
        run: npm run build

